services:
  postgres:
    image: postgres:16
    container_name: smartlead-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartlead

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartlead"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build: .
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: